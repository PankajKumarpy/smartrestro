{% extends "base.html" %}
{% block title %}GST Settings | Smart RMS{% endblock %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h1 class="h4 fw-semibold mb-1">GST Settings</h1>
      <div class="text-muted">Configure GST percentage used during billing.</div>
    </div>
    <a class="btn btn-outline-dark" href="{% url 'billing:invoice_list' %}">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">GST rate (%)</label>
            {{ form.gst_rate }}
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
              {{ form.is_active }}
              <label class="form-check-label">Active</label>
            </div>
          </div>
        </div>
        <div class="mt-4">
          <button class="btn btn-dark" type="submit"><i class="bi bi-check2-circle me-1"></i>Save</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
